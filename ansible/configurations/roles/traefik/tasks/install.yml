# Traefik is installed by the management cluster's ArgoCD via the
# `networking-traefik` Application defined in
# andusystems-management/apps/andusystems-networking/manifest.yml.
#
# This role exists for parity with the other app roles but has no
# pre-bootstrap work to do: traefik has no vault-templated secrets
# and no apps/traefik/manifest.yml side resources. ArgoCD creates
# the namespace via syncOption CreateNamespace=true.
