---
# Configure VMs on Proxmox
- name: install | Allow ubuntu user to run passwordless sudo commands
  ansible.builtin.copy:
    content: '{{ ssh_user }} ALL=(ALL) NOPASSWD:ALL'
    dest: '/etc/sudoers.d/{{ ssh_user }}'
    mode: '0440'
    validate: 'visudo -cf %s'
  become: true

# Workaround for a Go runtime bug where async preemption causes issues
# with certain system calls on older kernels; disabling it prevents crashes
- name: install | Set GODEBUG environment variable
  ansible.builtin.set_fact:
    ansible_environment:
      GODEBUG: "{{ lookup('env', 'GODEBUG') }},asyncpreemptoff=1"

# --- Install Kubernetes dependencies on all nodes ---
# Wait for any background apt processes (e.g. unattended-upgrades) to finish
# before proceeding, to avoid "Could not get lock" errors during package install
- name: install | Wait for apt locks to release
  ansible.builtin.shell: |
    while fuser /var/lib/apt/lists/lock /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock >/dev/null 2>&1; do
      echo "Waiting for apt lock..."
      sleep 5
    done
  changed_when: false
  args:
    executable: /bin/bash

# Kubernetes requires swap to be disabled; kubelet will refuse to start otherwise
- name: install | Disable swap
  ansible.builtin.command:
    cmd: swapoff -a
  changed_when: true

- name: install | Add Kubernetes apt key
  ansible.builtin.apt_key:
    url: https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key
    keyring: /usr/share/keyrings/kubernetes-apt-keyring.gpg
    state: present

- name: install | Add Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /"
    state: present
    filename: kubernetes.list

- name: install | Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3300

- name: install | Install required packages
  ansible.builtin.apt:
    name:
      - containerd
      - kubelet
      - kubeadm
      - kubectl
      - conntrack
    state: present

# Pin kubelet/kubeadm/kubectl versions to prevent unattended-upgrades from
# upgrading them independently, which could cause version skew in the cluster
- name: install | Hold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

# overlay: required by containerd for its overlay filesystem driver
# br_netfilter: enables iptables to process bridged traffic for pod networking
- name: install | Load required kernel modules
  ansible.builtin.copy:
    content: |
      overlay
      br_netfilter
    dest: /etc/modules-load.d/k8s.conf
    mode: '0644'

- name: install | Load modules
  ansible.builtin.command:
    cmd: "modprobe {{ item }}"
  loop:
    - overlay
    - br_netfilter
  changed_when: false

# Enable bridged traffic to traverse iptables rules (required for pod-to-pod
# and pod-to-service communication) and enable IP forwarding for routing
- name: install | Configure sysctl for Kubernetes
  ansible.builtin.copy:
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
    dest: /etc/sysctl.d/99-kubernetes.conf
    mode: '0644'

- name: install | Apply sysctl settings
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: false

# Generate the default containerd config then switch the cgroup driver to systemd,
# which is required so containerd and kubelet use the same cgroup manager.
# Mismatched cgroup drivers cause kubelet to fail during pod creation.
- name: install | Configure containerd
  block:
    - name: Create containerd directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: install | Generate default containerd config
      ansible.builtin.shell: |
        containerd config default > /etc/containerd/config.toml
      args:
        executable: /bin/bash
      changed_when: true

    - name: install | Enable SystemdCgroup in containerd config
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: install | Start and enable containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: true
        daemon_reload: true

- name: install | Enable kubelet
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
    state: started

# --- Initialize control plane ---
# Force-reset any prior kubeadm state so init starts from a clean slate.
# ignore_errors handles the case where kubeadm was never initialized.
- name: install | Reset kubeadm (clean state)
  ansible.builtin.command:
    cmd: kubeadm reset -f
  changed_when: true
  ignore_errors: true

# Remove stale CNI virtual interfaces and network state left over from a
# previous cluster; lingering interfaces cause IP conflicts on reinit
- name: install | Clean CNI interfaces
  ansible.builtin.shell: |
    ip link delete cni0 2>/dev/null || true
    ip link delete flannel.1 2>/dev/null || true
    rm -rf /var/lib/cni/networks/* /run/flannel/subnet.env 2>/dev/null || true
  args:
    executable: /bin/bash
  changed_when: false

- name: install | Initialize Kubernetes cluster
  ansible.builtin.command:
    cmd: kubeadm init --pod-network-cidr={{ pod_network_cidr }}
  register: kubeadm_init
  changed_when: "'Your Kubernetes control-plane has been initialized successfully' in kubeadm_init.stdout"

- name: install | Create .kube directory
  ansible.builtin.file:
    path: /home/{{ ssh_user }}/.kube
    state: directory
    mode: '0700'

- name: install | Copy admin.conf to user's kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ssh_user }}/.kube/config"
    remote_src: true
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: '0300'

- name: install | Set ownership of kubeconfig
  ansible.builtin.file:
    path: /home/{{ ssh_user }}/.kube/config
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: '0300'

# Check for admin.conf to confirm the control plane was initialized successfully
# before attempting to generate a join token for workers
- name: install | Check if cluster is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_config
  run_once: true
  become: true
  when: inventory_hostname in groups['controllers']

# Generate a short-lived bootstrap token and the full join command.
# Only runs on the controller and only if the cluster is initialized.
- name: install | Get join command from control plane
  ansible.builtin.command:
    cmd: kubeadm token create --print-join-command
  register: join_command_raw
  changed_when: true
  run_once: true
  become: true
  when: inventory_hostname in groups['controllers'] and k8s_config.stat.exists

# Cache the join command as a fact so it is available on all hosts (including workers)
- name: install | Set join command fact
  ansible.builtin.set_fact:
    join_command: "{{ join_command_raw.stdout }}"
    cacheable: true
  run_once: true

- name: install | Install Flannel CNI
  ansible.builtin.command:
    cmd: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
  changed_when: true
  run_once: true
  environment:
    KUBECONFIG: "/home/{{ ssh_user }}/.kube/config"

- name: install | Fetch kubeconfig to local machine
  ansible.builtin.fetch:
    src: "/home/{{ ssh_user }}/.kube/config"
    dest: "{{ repo_root }}/kubeconfig"
    flat: true
  run_once: true

# --- Join worker nodes ---
# Reset workers before joining to clear any stale cluster membership.
# ignore_errors handles workers that were never part of a cluster.
- name: install | Reset kubeadm on worker
  ansible.builtin.command:
    cmd: kubeadm reset -f
  changed_when: true
  ignore_errors: true
  when: inventory_hostname in groups['workers']

# Clean up stale CNI state on workers (same rationale as the controller cleanup)
- name: install | Clean CNI interfaces on worker
  ansible.builtin.shell: |
    ip link delete cni0 2>/dev/null || true
    ip link delete flannel.1 2>/dev/null || true
    rm -rf /var/lib/cni/networks/* /run/flannel/subnet.env 2>/dev/null || true
  args:
    executable: /bin/bash
  changed_when: false
  when: inventory_hostname in groups['workers']

# Brief pause to let the control plane API server and Flannel CNI stabilize
# after initialization before workers attempt to join
- name: install | Wait for control plane to be ready before joining workers
  ansible.builtin.shell: |
    sleep 15

# Re-generate the join token immediately before joining to avoid token expiry
# issues; delegates to the first controller since only it can create tokens
- name: install | Get fresh join command
  ansible.builtin.command:
    cmd: kubeadm token create --print-join-command
  register: fresh_join_command
  delegate_to: "{{ groups['controllers'][0] }}"
  run_once: true
  changed_when: true

- name: install | Set fresh join command fact
  ansible.builtin.set_fact:
    join_command: "{{ fresh_join_command.stdout }}"
  run_once: true

# Retry the join up to 3 times (15s apart) to handle transient API server
# unavailability right after init. --ignore-preflight-errors=all skips checks
# that may fail on a freshly-reset node (e.g. port in use, existing config).
- name: install | Join worker to cluster with retries
  ansible.builtin.shell: |
    {{ join_command }} --ignore-preflight-errors=all
  args:
    executable: /bin/bash
  when: inventory_hostname in groups['workers']
  register: join_result
  retries: 3
  delay: 15
  until: join_result.rc == 0

# Verify cluster membership by listing all registered nodes.
# Delegated to localhost using the fetched kubeconfig so it works outside the VMs.
- name: install | Get all node names
  ansible.builtin.command:
    cmd: kubectl get nodes -o jsonpath='{.items[*].metadata.name}'
  register: node_names
  changed_when: false
  run_once: true
  delegate_to: localhost
  environment:
    KUBECONFIG: "{{ kubeconfig }}"