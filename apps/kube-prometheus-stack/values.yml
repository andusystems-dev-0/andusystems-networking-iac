fullnameOverride: networking-kube-prometheus

# Spoke cluster config — NO Grafana UI (hub cluster handles that)
grafana:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 15Gi
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    # Scrape all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    # Enable remote write receiver so Alloy can push metrics
    enableRemoteWriteReceiver: true
    enableFeatures:
      - remote-write-receiver
      - otlp-write-receiver
    # Identify this cluster in multi-cluster queries
    externalLabels:
      cluster: networking
      vlan: "30"
  service:
    type: LoadBalancer
    port: 9090
    loadBalancerIP: "10.238.30.22"

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

# Prometheus Operator CRDs (fixes MinIO Probe CRD issue)
crds:
  enabled: true

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
