apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pihole-ingressroute
  namespace: pihole
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`{{ pihole_url }}`) && (PathPrefix(`/admin`) || PathPrefix(`/api`))"
      kind: Rule
      middlewares:
        - name: pihole-headers
          namespace: pihole
      services:
        - name: networking-pihole-web
          port: 80
          namespace: pihole
  tls:
    secretName: pihole-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pihole-ingressroute-http
  namespace: pihole
spec:
  entryPoints:
    - web
  routes:
    - match: "Host(`{{ pihole_url }}`) && (PathPrefix(`/admin`) || PathPrefix(`/api`))"
      kind: Rule
      middlewares:
        - name: redirect-to-https
          namespace: pihole
      services:
        - name: networking-pihole-web
          port: 80
          namespace: pihole
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: pihole
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: pihole-headers
  namespace: pihole
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pihole-tls
  namespace: pihole
spec:
  secretName: pihole-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - "{{ pihole_url }}"
