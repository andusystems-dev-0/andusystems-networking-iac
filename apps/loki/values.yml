fullnameOverride: networking-loki

# Force SingleBinary mode
deploymentMode: SingleBinary

loki:
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    bucketNames:
      chunks: loki-data
      ruler: loki-ruler
    s3:
      endpoint: http://10.238.40.23:9000
      bucketnames: loki-data
      region: us-east-1
      s3ForcePathStyle: true
      insecure: true
  auth_enabled: false
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 30d
    ingestion_rate_mb: 8
    ingestion_burst_size_mb: 16
    max_query_parallelism: 8
  rulerConfig:
    storage:
      type: s3
      s3:
        endpoint: http://10.238.40.23:9000
        bucketnames: loki-ruler
        region: us-east-1
        s3ForcePathStyle: true
        insecure: true

# SingleBinary configuration
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: longhorn
    size: 10Gi
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: loki-minio-credentials
          key: rootUser
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: loki-minio-credentials
          key: rootPassword
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  service:
    enabled: true
    type: LoadBalancer
    loadBalancerIP: 10.238.30.23
    port: 3100
    targetPort: 3100

gateway:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

serviceMonitor:
  enabled: true